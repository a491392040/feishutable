<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关联字段写入测试</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; background: #f5f6f7; }
    .log { background: #fff; border: 1px solid #e5e6eb; border-radius: 8px; padding: 12px; margin: 8px 0; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
    .log .ok { color: #52c41a; }
    .log .err { color: #ff4d4f; }
    .log .info { color: #3370ff; }
    .log .warn { color: #faad14; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 4px; }
    .btn-primary { background: #3370ff; color: #fff; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .section { background: #fff; border: 1px solid #e5e6eb; border-radius: 8px; padding: 16px; margin: 8px 0; }
    .section h3 { margin: 0 0 8px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>🔗 关联字段写入测试</h2>
  <p>测试飞书多维表格中关联字段的正确写入方式（使用全局 bitable 对象）</p>

  <div class="section">
    <h3>步骤 1：环境检测</h3>
    <button class="btn-primary" onclick="testEnvironment()">检测环境</button>
  </div>

  <div class="section">
    <h3>步骤 2：获取表信息</h3>
    <button class="btn-primary" onclick="testGetTableInfo()">获取当前表和字段</button>
  </div>

  <div class="section">
    <h3>步骤 3：测试关联写入（5种方式）</h3>
    <p>请先确保当前表有<strong>自关联字段</strong>（关联到自身的单向/双向关联字段）</p>
    <button class="btn-primary" onclick="testAllLinkMethods()">运行全部测试</button>
    <button class="btn-danger" onclick="cleanup()">清理测试数据</button>
  </div>

  <div class="section">
    <h3>📋 测试日志</h3>
    <div class="log" id="log"></div>
  </div>

  <script>
    var logEl = document.getElementById('log');
    var testRecordIds = [];
    var _selfLinkFieldId = null;
    var _tableId = null;
    var _textFieldId = null;
    var _workingMethod = null;

    function log(msg, type) {
      var div = document.createElement('div');
      if (type) div.className = type;
      div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function sleep(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    // ========== 步骤1 ==========
    async function testEnvironment() {
      log('--- 环境检测 ---', 'info');
      try {
        var hasBitable = typeof bitable !== 'undefined';
        log('bitable 对象: ' + (hasBitable ? '✅ 存在' : '❌ 不存在'), hasBitable ? 'ok' : 'err');

        if (hasBitable && bitable.base) {
          var table = await bitable.base.getActiveTable();
          log('当前活动表: ✅ ' + table.id, 'ok');
        } else if (hasBitable) {
          log('bitable.base: ❌ 不存在', 'err');
        }
      } catch (err) {
        log('环境检测失败: ' + err.message, 'err');
        log('⚠️ 请确保在飞书多维表格的 iframe 环境中运行', 'warn');
      }
    }

    // ========== 步骤2 ==========
    async function testGetTableInfo() {
      log('--- 获取表信息 ---', 'info');
      try {
        var table = await bitable.base.getActiveTable();
        var name = await table.getName();
        _tableId = table.id;
        log('表名: ' + name + ' (ID: ' + table.id + ')');

        var fieldMetaList = await table.getFieldMetaList();
        log('字段总数: ' + fieldMetaList.length);

        _selfLinkFieldId = null;
        _textFieldId = null;

        for (var i = 0; i < fieldMetaList.length; i++) {
          var fm = fieldMetaList[i];
          var isLink = (fm.type === 18 || fm.type === 19);
          var isSelfLink = isLink && fm.property && fm.property.tableId === table.id;
          var isText = (fm.type === 1);
          var marker = isSelfLink ? ' 🔗[自关联]' : isLink ? ' 🔗[关联]' : '';
          if (isText && !_textFieldId) marker += ' 📝[文本]';
          log('  - ' + fm.name + ' (ID: ' + fm.id + ', 类型: ' + fm.type + ')' + marker, isSelfLink ? 'warn' : '');

          if (isSelfLink && !_selfLinkFieldId) {
            _selfLinkFieldId = fm.id;
          }
          if (isText && !_textFieldId) {
            _textFieldId = fm.id;
          }
        }

        if (_selfLinkFieldId) {
          log('✅ 找到自关联字段 ID: ' + _selfLinkFieldId, 'ok');
        } else {
          log('❌ 未找到自关联字段！请先创建一个关联到自身的字段', 'err');
        }

        if (_textFieldId) {
          log('✅ 找到文本字段 ID: ' + _textFieldId, 'ok');
        }

        var recordIdList = await table.getRecordIdList();
        log('记录总数: ' + recordIdList.length);
      } catch (err) {
        log('获取表信息失败: ' + err.message, 'err');
      }
    }

    // ========== 步骤3 ==========
    async function testAllLinkMethods() {
      log('--- 开始测试关联写入 ---', 'info');

      if (!_selfLinkFieldId) {
        log('❌ 请先运行步骤2，确保找到自关联字段', 'err');
        return;
      }

      var table = await bitable.base.getActiveTable();
      var linkFieldId = _selfLinkFieldId;

      try {
        // 创建两条测试记录
        log('📝 创建测试记录...', 'info');
        var parentFields = {};
        if (_textFieldId) parentFields[_textFieldId] = '测试-父记录';
        var parentRecordId = await table.addRecord({ fields: parentFields });
        testRecordIds.push(parentRecordId);
        log('✅ 父记录已创建: ' + parentRecordId, 'ok');

        var childFields = {};
        if (_textFieldId) childFields[_textFieldId] = '测试-子记录';
        var childRecordId = await table.addRecord({ fields: childFields });
        testRecordIds.push(childRecordId);
        log('✅ 子记录已创建: ' + childRecordId, 'ok');

        await sleep(500);

        // 检查关联是否成功的通用函数
        async function checkLink(rid, label) {
          try {
            var val = await table.getCellValue(linkFieldId, rid);
            var json = JSON.stringify(val);
            var hasLink = false;
            if (val) {
              if (val.recordIds && val.recordIds.length > 0) hasLink = true;
              if (Array.isArray(val) && val.length > 0) hasLink = true;
              if (typeof val === 'string' && val.indexOf('rec') === 0) hasLink = true;
            }
            log('  结果: ' + (hasLink ? '✅ 成功！' : '❌ 失败') + ' 值: ' + json, hasLink ? 'ok' : 'err');
            return hasLink;
          } catch (e) {
            log('  读取失败: ' + e.message, 'err');
            return false;
          }
        }

        async function clearLink(rid) {
          try {
            await table.setCellValue(linkFieldId, rid, null);
            await sleep(300);
          } catch (e) {
            log('  清除关联失败: ' + e.message, 'warn');
          }
        }

        // ---- 方式1 ----
        log('');
        log('【方式1】table.setCellValue(fieldId, recordId, IOpenLink对象)', 'info');
        try {
          await table.setCellValue(linkFieldId, childRecordId, {
            text: '',
            type: 'text',
            recordIds: [parentRecordId],
            tableId: _tableId,
          });
          if (await checkLink(childRecordId, '方式1')) _workingMethod = 1;
        } catch (err) {
          log('  ❌ 报错: ' + err.message, 'err');
        }
        await clearLink(childRecordId);

        // ---- 方式2 ----
        log('');
        log('【方式2】field.setValue(recordId, [parentRecordId])', 'info');
        try {
          var field = await table.getField(linkFieldId);
          await field.setValue(childRecordId, [parentRecordId]);
          if (await checkLink(childRecordId, '方式2')) _workingMethod = 2;
        } catch (err) {
          log('  ❌ 报错: ' + err.message, 'err');
        }
        await clearLink(childRecordId);

        // ---- 方式3 ----
        log('');
        log('【方式3】field.createCell() + table.addRecordByCell()', 'info');
        try {
          var textCell = null;
          if (_textFieldId) {
            var textField = await table.getField(_textFieldId);
            textCell = await textField.createCell('测试-Cell方式');
          }
          var linkField = await table.getField(linkFieldId);
          var linkCell = await linkField.createCell([parentRecordId]);
          var cells = textCell ? [textCell, linkCell] : [linkCell];
          var newId3 = await table.addRecordByCell(cells);
          testRecordIds.push(newId3);
          if (await checkLink(newId3, '方式3')) _workingMethod = 3;
        } catch (err) {
          log('  ❌ 报错: ' + err.message, 'err');
        }

        // ---- 方式4 ----
        log('');
        log('【方式4】table.addRecord({ fields: { linkFieldId: [recordId] } })', 'info');
        try {
          var fields4 = {};
          if (_textFieldId) fields4[_textFieldId] = '测试-数组方式';
          fields4[linkFieldId] = [parentRecordId];
          var newId4 = await table.addRecord({ fields: fields4 });
          testRecordIds.push(newId4);
          if (await checkLink(newId4, '方式4')) _workingMethod = 4;
        } catch (err) {
          log('  ❌ 报错: ' + err.message, 'err');
        }

        // ---- 方式5 ----
        log('');
        log('【方式5】table.addRecord({ fields: { linkFieldId: IOpenLink对象 } })', 'info');
        try {
          var fields5 = {};
          if (_textFieldId) fields5[_textFieldId] = '测试-IOpenLink方式';
          fields5[linkFieldId] = {
            text: '',
            type: 'text',
            recordIds: [parentRecordId],
            tableId: _tableId,
          };
          var newId5 = await table.addRecord({ fields: fields5 });
          testRecordIds.push(newId5);
          if (await checkLink(newId5, '方式5')) _workingMethod = 5;
        } catch (err) {
          log('  ❌ 报错: ' + err.message, 'err');
        }

        // 总结
        log('');
        log('========== 测试完成 ==========', 'info');
        if (_workingMethod) {
          log('✅ 推荐使用方式' + _workingMethod, 'ok');
        } else {
          log('❌ 所有方式均失败，请检查日志', 'err');
        }

      } catch (err) {
        log('测试过程出错: ' + err.message, 'err');
        console.error(err);
      }
    }

    // ========== 清理 ==========
    async function cleanup() {
      log('--- 清理测试数据 ---', 'info');
      if (testRecordIds.length === 0) {
        log('没有需要清理的记录', 'info');
        return;
      }
      try {
        var table = await bitable.base.getActiveTable();
        for (var i = 0; i < testRecordIds.length; i++) {
          try {
            await table.deleteRecord(testRecordIds[i]);
            log('已删除: ' + testRecordIds[i], 'ok');
          } catch (e) {
            log('删除失败 ' + testRecordIds[i] + ': ' + e.message, 'warn');
          }
        }
        testRecordIds = [];
        log('清理完成', 'ok');
      } catch (err) {
        log('清理失败: ' + err.message, 'err');
      }
    }
  </script>
</body>
</html>
